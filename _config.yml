title: "Vitro Media Lab"
description: "Digital architecture for brands requiring distinctiveness."
url: "https://vitromedialab.github.io"

# Build settings
markdown: kramdown

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .bundle
  - .git
  - README.md
  - live.html

# Custom collections
collections:
  specs:
    output: true
    permalink: /spec/:path
  photographers:
    output: true
    permalink: /featured/:path

# Default front‑matter for collections
defaults:
  - scope:
      path: ""
      type: "specs"
    values:
      layout: "spec"
      category: "web"
  - scope:
      path: ""
      type: "photographers"
    values:
      layout: "photographer"
