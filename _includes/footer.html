<footer>
  <div class="container">
    
    <div class="footer-cta reveal stagger-1">
      <div class="cta-text reveal stagger-2">
        <span class="tech-label">{{ page.footer_label | default: "Fig 5.0 — Contact" }}</span>
        <h2 class="footer-heading">Let's build your<br>digital identity.</h2>
      </div>
      <div class="cta-action reveal stagger-3">
        {% unless page.hide_footer_cta %}
        <a href="{{ '/contact/' | relative_url }}" class="btn-primary">Start a Project</a>
        {% endunless %}
      </div>
    </div>

    <div class="footer-bottom">
      <div class="copyright">
        &copy; <script>document.write(new Date().getFullYear())</script> Vitro Media Lab
      </div>
      <div class="socials">
        <a href="https://www.facebook.com/vitromedialab" target="_blank" class="social-link"><i class="fab fa-facebook"></i></a>
        <a href="https://www.instagram.com/vitromedialab/" target="_blank" class="social-link"><i class="fab fa-instagram"></i></a>
        <a href="mailto:hello@vitromedialab.com" target="_blank" class="social-link"><i class="fas fa-envelope"></i></a>
      </div>
    </div>

  </div>
</footer>

<script>
  /* ROTATING TEXT ENGINE */
  const words = ["websites", "photos", "artwork", "videos", "graphics"];
  let currentIndex = 0;
  const textElement = document.getElementById("rotating-text");

  if (textElement) {
    function rotateWord() {
      textElement.classList.remove("slide-in");
      textElement.classList.add("slide-out");
      setTimeout(() => {
        currentIndex = (currentIndex + 1) % words.length;
        textElement.innerText = words[currentIndex];
        textElement.classList.remove("slide-out");
        textElement.classList.add("slide-in");
      }, 600);
    }
    setInterval(rotateWord, 3000);
  }

  /* SCROLL REVEAL ENGINE */
  const observerOptions = { threshold: 0, rootMargin: "0px" };
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) entry.target.classList.add('active');
    });
  }, observerOptions);
  document.querySelectorAll('.reveal').forEach(el => {
    if (!el.classList.contains('active')) {
      observer.observe(el);
    }
  });

  /* DYNAMIC FIGURE NUMBER */
  const sections = document.querySelectorAll('section');
  const directoryHeaders = document.querySelectorAll('div.directory-header');
  const directoryGrids = document.querySelectorAll('div.directory-grid');
  const sectionCount = sections.length + directoryHeaders.length + directoryGrids.length;
  const footerLabel = document.querySelector('footer .tech-label');
  if (footerLabel) {
    const currentText = footerLabel.textContent;
    // Match "Fig X.0 — Something" pattern
    const match = currentText.match(/^Fig \d+\.0 — (.+)$/);
    const suffix = match ? match[1] : 'Contact';
    footerLabel.textContent = `Fig ${sectionCount}.0 — ${suffix}`;
  }
</script>
